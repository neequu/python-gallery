[project]
name = "shared"
version = "0.1.0"
description = "Shared utilities for microservices"
requires-python = ">=3.12"
dependencies = [
    "sqlalchemy",
    "pydantic",
    "python-jose[cryptography]",
    "passlib[bcrypt]"
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["shared"]
package-dir = { "shared" = "." }